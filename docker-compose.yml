services:
  app:
    build:
      context: .
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-public.ecr.aws/docker/library/python:3.11-slim}
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-}
        HOST_ARCH: ${BUILD_ARCH:-}
    ports:
      - "8600:8501"
    volumes:
      - ./app.py:/app/app.py:ro
      - ./llm_client.py:/app/llm_client.py:ro
      - ./lab_adapter_openai_reference.py:/app/lab_adapter_openai_reference.py:ro
    environment:
      INTERNAL_LLM_URL: ${INTERNAL_LLM_URL:-http://host.docker.internal:35700/v1}
      LAB_LLM_URL: ${LAB_LLM_URL:-http://host.docker.internal:11434/v1}
      LAB_OPENAI_API_KEY: ${LAB_OPENAI_API_KEY:-ollama}
    extra_hosts:
      - "host.docker.internal:host-gateway"
